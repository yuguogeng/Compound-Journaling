    function addTaskTagFromInput() { return false; }
    function refreshTaskTagUI() {}
    function tagInputKey(e) {}
    function renderS3body() {}
    function saveOpenBlockNote() { saveOpenBlockNotes(); }
    function blockBodyHTML(b) { return ""; }
    function toggleBlock(id) {}
    function updateBlockTasks(id,v) {}

    // ── Step 4: Narrative + Tags + Summary (merged) ───────────────────
    function renderStep4() {
      document.getElementById("main-content").innerHTML = ['<div class="entry-step">',stepHeader("Narrative & Tags"),
        '<div id="s4body"></div>',
        '<div class="step-nav">',
          '<button type="button" class="ghost-btn" id="bbk4"><span aria-hidden="true">←</span><span>Back</span></button>',
          '<button type="button" class="primary-btn" id="bnx4"><span>Save entry</span><span aria-hidden="true">✓</span></button>',
        '</div></div>'].join("");
      document.getElementById("bbk4").onclick = () => { saveEntryNow(); goStep(2); };
      document.getElementById("bnx4").onclick = () => { saveEntryNow(); renderDone(); };
      renderS4body();
    }
    function renderS4body() {
      const body = document.getElementById("s4body"); if (!body) return;
      const n = S.narrative;
      body.innerHTML = [
        '<section class="card stack">',
          textAreaField("entry","Today's entry", n.entry, 7),
          textAreaField("wins","Wins", n.wins, 3),
          textAreaField("blockers","Blockers", n.blockers, 3),
          textAreaField("intention","Tomorrow's intention", n.intention, 3),
        '</section>',
        '<section class="card">',
          '<div class="section-title"><h2>ENTRY TAGS</h2><button type="button" class="small-btn '+(entryTagEdit?"danger-btn":"")+'" onclick="toggleEntryTagEdit()">'+(entryTagEdit?"Done":"Edit tags")+'</button></div>',
          entryTagsHTML(),
        '</section>',
        '<section class="card"><h2>Entry summary</h2>'+summaryHTML()+'</section>'
      ].join("");
    }
    function textAreaField(key, label, value, rows) { return '<div class="field"><label>'+label+'</label><textarea rows="'+rows+'" oninput="setNarrative(\''+key+'\', this.value)">'+esc(value)+'</textarea></div>'; }
    function setNarrative(key, v) { S.narrative[key] = v; markDirty(); }
    function entryTagsHTML() {
      const pool = allTags();
      if (entryTagEdit) {
        const chips = pool.length ? pool.map(tag=>'<button type="button" class="tag-chip '+(S.entryTags.includes(tag)?"active":"")+'" onclick="deleteEntryTagFromPool(\''+escAttr(tag)+'\')">'+esc(tag)+' <span class="tag-del"><span aria-hidden="true">✕</span></span></button>').join("") : '<span class="tiny">No tags yet.</span>';
        return ['<div class="chip-row">'+chips+'</div>',
          '<div class="inline-add" style="margin-top:12px"><input id="entry-tag-input" type="text" placeholder="#writing-session" onkeydown="entryTagInputKey(event)">',
          '<button type="button" class="ghost-btn" onclick="toggleEntryTagEdit()" aria-label="Done">&#10005;</button>',
          '<button type="button" class="primary-btn" onclick="createEntryTag()">Add</button></div>'].join("");
      }
      if (!pool.length) return '<p class="tiny">Create tags in edit mode or on tasks.</p>';
      return '<div class="chip-row">'+pool.map(tag=>'<button type="button" class="tag-chip '+(S.entryTags.includes(tag)?"active":"")+'" onclick="toggleEntryTag(\''+escAttr(tag)+'\')">'+esc(tag)+'</button>').join("")+'</div>';
    }
    function summaryHTML() {
      const alcohol  = S.alcohol.drank ? "Alcohol logged; streak resets" : "Sober "+S.alcohol.soberDays+" day"+plural(S.alcohol.soberDays);
      const habits   = [S.reading.done?"Read "+readingPct()+"%":"Reading missed", S.meditation.done?"Meditated "+(S.meditation.minutes||0)+"m":"No meditation", S.calligraphy.done?"Calligraphy "+(S.calligraphy.minutes||0)+"m":"No calligraphy"].join(" / ");
      const vitals   = "Energy "+S.vitals.energy+"/5, mood "+S.vitals.mood+"/5, stress "+stressLabel(S.vitals.stress);
      const exercise = S.exercise.map(exerciseLabel).join(", ");
      const tasks    = completedTasks(S);
      return ['<div class="summary-list">',
        summaryRow("Sleep", formatHours(S.sleep.hours)+'  ·  Quality '+(S.sleep.qualityScore||50)+'/100'),
        summaryRow("Alcohol",  alcohol),
        summaryRow("Habits",   habits),
        summaryRow("Energy/Mood", vitals),
        summaryRow("Exercise", exercise||"None"),
        summaryRow("Tasks",    tasks.done+"/"+tasks.total+" complete"),
      '</div>'].join("");
    }
    function summaryRow(label, value) { return '<div class="summary-row"><strong>'+label+'</strong><span>'+esc(value)+'</span></div>'; }
    function toggleEntryTagEdit() { entryTagEdit = !entryTagEdit; renderS4body(); }
    function toggleEntryTag(tag) { S.entryTags.includes(tag)?S.entryTags=S.entryTags.filter(t=>t!==tag):S.entryTags.push(tag); markDirty(); renderS4body(); }
    function deleteEntryTagFromPool(tag) { deleteTagEverywhere(tag); markDirty(); renderS4body(); }
    function createEntryTag() { const inp=document.getElementById("entry-tag-input"); const tag=normalizeTag(inp?inp.value:""); if(!tag)return; if(!S.entryTags.includes(tag))S.entryTags.push(tag); markDirty(); renderS4body(); }
    function entryTagInputKey(e) { if(e.key==="Enter"){e.preventDefault();createEntryTag();} if(e.key==="Escape"){e.preventDefault();toggleEntryTagEdit();} }

    // ── Done screen ───────────────────────────────────────────────────
    function renderDone() {
      setHeader("Saved","Entry complete");
      const habits = [];
      if (!S.alcohol.drank) habits.push("Sober "+S.alcohol.soberDays+"d");
      if (S.meditation.done) habits.push("Meditated");
      if (S.reading.done) habits.push("Read "+readingPct()+"%");
      if (S.calligraphy.done) habits.push("Calligraphy");
      const exercise = S.exercise.includes("no-exercise") ? "no exercise logged" : S.exercise.map(exerciseLabel).join(", ");
      document.getElementById("main-content").innerHTML = ['<div class="done-card">',
        '<span class="check-ring"><span aria-hidden="true">✓</span></span>',
        '<h2>Entry saved</h2>',
        '<span class="badge green"><span aria-hidden="true">🔥</span>'+calculateEntryStreak()+' day streak</span>',
        '<div class="chip-row" style="justify-content:center">'+habits.map(h=>'<span class="badge">'+esc(h)+'</span>').join("")+'</div>',
        '<div class="insight-card"><strong>Today in brief</strong><br>'+formatHours(S.sleep.hours)+' sleep, '+(S.alcohol.drank?"alcohol use":"a sober day")+', and '+esc(exercise)+'. Entry synced to Firebase.</div>',
        '<div class="grid2" style="width:100%">',
          '<button type="button" class="ghost-btn" onclick="switchView(\'export\')">View data &amp; export</button>',
          '<button type="button" class="primary-btn" onclick="startNewEntry()">Start new entry</button>',
        '</div>',
      '</div>'].join("");
      renderAI();
    }
    function startNewEntry() { S=normaliseState(blankState(todayStr(),false)); addingTask=false; currentStep=0; setHeader("Today","Today's entry"); switchView("entry"); }

    // ── History ───────────────────────────────────────────────────────
    function renderHistory() {
      if (!S) return;
      const rows = sortedEntries().map(entry=>{
        const tasks=completedTasks(entry), q=dayQuality(entry);
        return ['<article class="list-row">',
          '<div class="list-row-main">',
            '<div class="list-row-title">'+longDate(entry.date)+'</div>',
            '<div class="list-row-meta"><span>'+formatHours(entry.sleep&&entry.sleep.hours)+'</span><span>Tasks '+tasks.done+'/'+tasks.total+'</span><span>Energy '+(entry.vitals&&entry.vitals.energy||"-")+' / Mood '+(entry.vitals&&entry.vitals.mood||"-")+'</span></div>',
            '<div class="chip-row">'+(entry.entryTags||[]).map(tag=>'<span class="tag-chip active">'+esc(tag)+'</span>').join("")+'</div>',
          '</div>',
          '<div class="entry-actions"><span class="quality-badge '+q.key+'">'+q.label+'</span>'+deleteEntryButtonHTML(entry.date)+'</div>',
        '</article>'].join("");
      }).join("");
      document.getElementById("main-content").innerHTML = '<div class="view-stack">'+(rows||'<section class="card"><p class="muted">No saved entries yet.</p></section>')+'</div>';
    }

    // ── Weekly ────────────────────────────────────────────────────────
    function renderWeekly() {
      if (!S) return;
      const recent = lastNDaysEntries(7);
      const avgSleep  = average(recent.map(e=>Number(e.sleep&&e.sleep.hours)||0));
      const totalTasks= recent.reduce((s,e)=>s+completedTasks(e).total,0);
      const doneTasks = recent.reduce((s,e)=>s+completedTasks(e).done,0);
      const avgEnergy = average(recent.map(e=>Number(e.vitals&&e.vitals.energy)||0));
      const completion= totalTasks ? Math.round(doneTasks/totalTasks*100) : 0;
      document.getElementById("main-content").innerHTML = ['<div class="view-stack">',
        '<section class="stats-grid">',
          statCard("Avg sleep", recent.length?formatHours(avgSleep):"0h 0m"),
          statCard("Task completion", completion+"%"),
          statCard("Avg energy", recent.length?avgEnergy.toFixed(1)+"/5":"0/5"),
          statCard("Current streak", calculateEntryStreak()+"d"),
        '</section>',
        '<section class="card"><h2>Pattern review</h2><p class="muted">Keep logging — once several days are in, patterns in sleep, habits, tasks, and energy will surface here.</p></section>',
      '</div>'].join("");
    }
    function statCard(label, value) { return '<div class="stat-card"><span>'+label+'</span><strong>'+value+'</strong></div>'; }

    // ── Export / Import ───────────────────────────────────────────────
    function renderExport() {
      if (!S) return;
      const count = Object.keys(entries).length;
      const rows  = sortedEntries().map(entry=>{
        const tasks=completedTasks(entry), q=dayQuality(entry);
        return '<article class="list-row"><div class="list-row-main"><div class="list-row-title">'+longDate(entry.date)+'</div><div class="list-row-meta"><span>'+formatHours(entry.sleep&&entry.sleep.hours)+'</span><span>Tasks '+tasks.done+'/'+tasks.total+'</span></div></div><div class="entry-actions"><span class="quality-badge '+q.key+'">'+q.label+'</span>'+deleteEntryButtonHTML(entry.date)+'</div></article>';
      }).join("");
      document.getElementById("main-content").innerHTML = ['<div class="view-stack">',
        '<section class="card">',
          '<div class="section-title"><h2>Export</h2><span class="badge">'+count+' entries</span></div>',
          '<p class="tiny">Download a local backup of all your Firebase data.</p>',
          '<button type="button" class="primary-btn" onclick="downloadJSON()"><span aria-hidden="true">↓</span><span>Download JSON</span></button>',
        '</section>',
        '<section class="card">',
          '<h2>Import</h2>',
          '<div class="drop-zone" onclick="document.getElementById(\'import-file\').click()" ondragover="event.preventDefault(); this.classList.add(\'dragging\')" ondragleave="this.classList.remove(\'dragging\')" ondrop="handleImportDrop(event)">',
            '<span aria-hidden="true" style="font-size:28px">📂</span>',
            '<span>Drop a JSON backup here or tap to choose a file</span>',
          '</div>',
        '</section>',
        '<section class="card"><h2>Stored entries</h2><div class="view-stack">'+(rows||'<p class="muted">No entries yet.</p>')+'</div></section>',
        '<section class="card">',
          '<h2>Storage info</h2>',
          '<p class="muted">Your data is stored in Firebase Firestore and syncs across all devices automatically. Export a JSON backup as an extra safety net.</p>',
        '</section>',
        '<section class="card">',
          '<div class="section-title"><h2>Danger zone</h2><span class="badge red">Deletes from Firebase</span></div>',
          '<button type="button" id="clear-btn" class="danger-btn" onclick="clearAllEntries()">Clear all entries</button>',
        '</section>',
      '</div>'].join("");
    }
    function downloadJSON() {
      const payload = { app:"Compound Journal", version:"2.0.0", exportedAt:new Date().toISOString(), totalEntries:Object.keys(entries).length, entries:sortedEntries() };
      const blob = new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
      const url  = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href=url; a.download="compound-journal-"+todayStr()+".json";
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      showToast("JSON export prepared.");
    }
    function handleImportDrop(e) { e.preventDefault(); e.currentTarget.classList.remove("dragging"); handleImportFiles(e.dataTransfer.files); }
    async function handleImportFiles(files) {
      const file = files&&files[0]; if (!file) return;
      if (!file.name.toLowerCase().endsWith(".json")) { showToast("Choose a .json backup file."); return; }
      const reader = new FileReader();
      reader.onload = async function() {
        try {
          const parsed   = JSON.parse(reader.result);
          const incoming = Array.isArray(parsed.entries) ? parsed.entries : Object.values(parsed||{});
          let added = 0;
          for (const entry of incoming) {
            if (!entry||!entry.date||entries[entry.date]) continue;
            entries[entry.date] = normaliseImported(entry);
            await writeEntry(entry.date, entries[entry.date]);
            added++;
          }
          if (entries[S.date]) S = normaliseState(deepMerge(blankState(S.date,false), entries[S.date]));
          updateSidebarStreak(); renderExport();
          showToast("Imported "+added+" new entr"+(added===1?"y.":"ies."));
        } catch(e) { showToast("Could not parse that JSON file."); }
      };
      reader.readAsText(file);
    }
    function normaliseImported(entry) { return normaliseState(deepMerge(blankState(entry.date||todayStr(),false),entry)); }
    async function clearAllEntries() {
      const btn = document.getElementById("clear-btn");
      if (!clearArmed) {
        clearArmed = true;
        if (btn) { btn.textContent="Tap again to confirm"; btn.style.background="#E24B4A"; btn.style.color="white"; }
        setTimeout(()=>{ clearArmed=false; if(activeView==="export") renderExport(); }, 2000); return;
      }
      clearArmed = false;
      const dates = Object.keys(entries);
      await clearAllFirebase(dates);
      entries = {}; S = normaliseState(blankState(todayStr(),false));
      updateSidebarStreak(); renderExport(); showToast("All entries cleared.");
    }
    function deleteEntryButtonHTML(date) {
      const armed = deleteEntryArmedDate===date;
      return '<button type="button" class="danger-btn" onclick="deleteEntry('+jsArg(date)+')"><span aria-hidden="true">'+(armed?'⚠':'🗑')+'</span><span>'+(armed?"Confirm delete":"Delete")+'</span></button>';
    }
    async function deleteEntry(date) {
      if (!entries[date]) { deleteEntryArmedDate=""; if(activeView==="history")renderHistory(); if(activeView==="export")renderExport(); return; }
      if (deleteEntryArmedDate!==date) {
        deleteEntryArmedDate=date;
        if(activeView==="history")renderHistory(); if(activeView==="export")renderExport();
        setTimeout(()=>{ if(deleteEntryArmedDate===date){deleteEntryArmedDate=""; if(activeView==="history")renderHistory(); if(activeView==="export")renderExport();} }, 2000); return;
      }
      delete entries[date]; await removeEntry(date);
      deleteEntryArmedDate="";
      if (date===S.date) S=normaliseState(blankState(todayStr(),false));
      updateSidebarStreak(); renderAI();
      if(activeView==="history")renderHistory(); if(activeView==="export")renderExport();
      showToast("Deleted "+date+".");
    }

    // ── AI panel ──────────────────────────────────────────────────────
    function renderAI() {
      const panel = document.getElementById("ai-content"); if (!panel||!S) return;
      const streak = calculateEntryStreak(), tasks = completedTasks(S), cards = [];
      if (Number(S.sleep.hours)>=7) cards.push('<div class="ai-card green"><strong>Pattern</strong><br>Sleep is in the useful range today. Watch whether energy and task completion rise on these days.</div>');
      if (S.alcohol.drank) cards.push('<div class="ai-card amber"><strong>Warning</strong><br>Alcohol was logged today — tomorrow is a good checkpoint for sleep quality and stress.</div>');
      if (Number(S.vitals.energy)>=4&&Number(S.vitals.mood)>=4) cards.push('<div class="ai-card green"><strong>High output day</strong><br>Energy and mood are both elevated. Note what made this happen.</div>');
      if (S.vitals.stress==="very-high") cards.push('<div class="ai-card amber"><strong>Stress flagged</strong><br>Very-high stress was logged. Cross-reference sleep and tasks to find the pattern.</div>');
      if (tasks.total>0&&tasks.done===tasks.total) cards.push('<div class="ai-card green"><strong>Full completion</strong><br>Every task is done. This is a data point worth keeping.</div>');
      if (streak>0) cards.push('<div class="ai-card blue"><strong>Streak</strong><br>You have '+streak+' consecutive logged day'+plural(streak)+'. The dataset is compounding.</div>');
      if (!cards.length) cards.push('<div class="ai-card"><strong>Awaiting signal</strong><br>Keep filling the structured fields so patterns have enough clean data to emerge.</div>');
      panel.innerHTML = [cards.join(""),
        '<div class="ai-card"><div class="kicker">Stats</div>',
          aiStat("Sleep",formatHours(S.sleep.hours)),
          aiStat("Energy/Mood",S.vitals.energy+"/"+S.vitals.mood),
          aiStat("Tasks done",tasks.done+"/"+tasks.total),
          aiStat("Sober streak",S.alcohol.soberDays+"d"),
        '</div>'
      ].join("");
    }
    function aiStat(label, value) { return '<div class="ai-stat"><span>'+label+'</span><strong>'+value+'</strong></div>'; }
    function updateSidebarStreak() { if(!entries) return; const el=document.getElementById("sidebar-streak"); if(el) el.textContent=calculateEntryStreak(); }

    // ── Alcohol logic ─────────────────────────────────────────────────
    function deriveAlcohol() { deriveAlcoholFor(S); }
    function deriveAlcoholFor(state) {
      if (!state||!state.alcohol) return;
      if (state.alcohol.drank) { state.alcohol.soberDays=0; state.alcohol.lastDrink=state.date; return; }
      const previous = previousSoberDays(state.date);
      state.alcohol.soberDays = previous+1;
      state.alcohol.lastDrink = findLastDrinkBefore(state.date)||"";
    }
    function previousSoberDays(date) { const y=addDays(date,-1); const e=entries[y]; if(!e||!e.alcohol||e.alcohol.drank)return 0; return Number(e.alcohol.soberDays)||soberStreakEnding(y); }
    function soberStreakEnding(date) { let count=0,cursor=date; for(let i=0;i<370;i++){const e=entries[cursor]; if(!e||!e.alcohol||e.alcohol.drank)break; count++; cursor=addDays(cursor,-1);} return count; }
    function findLastDrinkBefore(date) { const dates=Object.keys(entries).filter(d=>d<date).sort().reverse(); for(const d of dates){if(entries[d]&&entries[d].alcohol&&entries[d].alcohol.drank)return d;} return ""; }
    function nextMilestone(days) { for(const m of MILESTONES){if(days<m)return m;} return days+1; }

    // ── Utility ───────────────────────────────────────────────────────
    function calculateEntryStreak() { let count=0,cursor=todayStr(); if(!entries[cursor])cursor=addDays(cursor,-1); for(let i=0;i<1000;i++){if(!entries[cursor])break; count++; cursor=addDays(cursor,-1);} return count; }
    function allTags() {
      const set=new Set();
      Object.values(entries).forEach(e=>{ (e.entryTags||[]).forEach(t=>{if(t)set.add(t);}); (e.tasks||[]).forEach(t=>{(t.tags||[]).forEach(g=>{if(g)set.add(g);});}); });
      (S.entryTags||[]).forEach(t=>{if(t)set.add(t);}); (S.tasks||[]).forEach(t=>{(t.tags||[]).forEach(g=>{if(g)set.add(g);});});
      return Array.from(set).sort();
    }
    function deleteTagEverywhere(tag) {
      S.entryTags=S.entryTags.filter(t=>t!==tag); S.tasks.forEach(t=>{t.tags=t.tags.filter(g=>g!==tag);});
      Object.keys(entries).forEach(d=>{ const e=entries[d]; e.entryTags=(e.entryTags||[]).filter(t=>t!==tag); (e.tasks||[]).forEach(t=>{t.tags=(t.tags||[]).filter(g=>g!==tag);}); });
    }
    function sortedEntries() { return Object.values(entries).sort((a,b)=>String(b.date).localeCompare(String(a.date))); }
    function lastNDaysEntries(n) { const end=todayStr(),start=addDays(end,-(n-1)); return sortedEntries().filter(e=>e.date>=start&&e.date<=end); }
    function completedTasks(entry) { const tasks=Array.isArray(entry.tasks)?entry.tasks:[]; return {total:tasks.length, done:tasks.filter(t=>t.done).length}; }
    function dayQuality(entry) {
      const tasks=completedTasks(entry), completion=tasks.total?tasks.done/tasks.total:0.5;
      let score=0;
      if(Number(entry.sleep&&entry.sleep.hours)>=7)score++;
      if(entry.alcohol&&!entry.alcohol.drank)score++;
      if(entry.vitals&&Number(entry.vitals.energy)>=3&&Number(entry.vitals.mood)>=3)score++;
      if(completion>=0.6)score++;
      if(entry.vitals&&(entry.vitals.stress==="high"||entry.vitals.stress==="very-high"))score--;
      if(score>=3)return{key:"good",label:"Good"};
      if(score>=1)return{key:"okay",label:"Okay"};
      return{key:"tough",label:"Tough"};
    }
    function readingPct() { return readingPctFor(S); }
    function readingPctFor(state) {
      const page=Number(state&&state.reading?state.reading.page:0)||0;
      const total=Number(state&&state.reading?state.reading.total:0)||0;
      if(!state||!state.reading||!state.reading.done||total<=0)return 0;
      return clamp(Math.round(page/total*100),0,100);
    }
    function sleepQuality(hours) { hours=Number(hours)||0; if(hours<5)return{label:"Poor",tone:"red"}; if(hours<7)return{label:"Short",tone:"amber"}; if(hours<=9)return{label:"Good ✓",tone:"green"}; return{label:"Oversleep",tone:"blue"}; }
    function calcSleepHours(bed,wake) { const b=timeToMinutes(bed),w=timeToMinutes(wake); if(b===null||w===null)return S.sleep.hours; let diff=w-b; if(diff<=0)diff+=24*60; return clamp(diff/60,0,12); }
    function timeToMinutes(v) { if(!v||!v.includes(":"))return null; const parts=v.split(":").map(Number); if(parts.some(isNaN))return null; return parts[0]*60+parts[1]; }
    function formatHours(v) { const total=Math.round((Number(v)||0)*60); return Math.floor(total/60)+"h "+(total%60)+"m"; }
    function exerciseLabel(v) { return({"no-exercise":"No exercise",jogging:"Jogging",swimming:"Swimming",strength:"Strength",other:"Other"})[v]||v; }
    function stressLabel(v) { return({low:"Low",medium:"Medium",high:"High","very-high":"Very high"})[v]||v; }
    function normalizeTag(v) { const c=String(v||"").trim().toLowerCase().replace(/^#+/,"").replace(/\s+/g,"-").replace(/[^a-z0-9-_]/g,"").replace(/-+/g,"-"); return c?"#"+c:""; }
    function average(values) { const valid=values.filter(v=>Number(v)>0); if(!valid.length)return 0; return valid.reduce((s,v)=>s+Number(v),0)/valid.length; }
    function todayStr() { return toYMD(new Date()); }
    function toYMD(date) { return date.getFullYear()+"-"+String(date.getMonth()+1).padStart(2,"0")+"-"+String(date.getDate()).padStart(2,"0"); }
    function fromYMD(v) { const p=String(v).split("-").map(Number); return new Date(p[0],p[1]-1,p[2]); }
    function addDays(v,n) { const d=fromYMD(v); d.setDate(d.getDate()+n); return toYMD(d); }
    function longDate(v) { return fromYMD(v).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric",year:"numeric"}); }
    function clamp(v,min,max) { return Math.max(min,Math.min(max,v)); }
    function plural(n) { return Number(n)===1?"":"s"; }
    function esc(v) { return String(v==null?"":v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }
    function escAttr(v) { return esc(v); }
    function jsArg(v) { return escAttr(JSON.stringify(String(v==null?"":v))); }
    function showToast(msg) { const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2600); }
  </script>
